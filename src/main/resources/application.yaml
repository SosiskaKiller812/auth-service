server:
    port: 8081

spring:

    application:
        name: auth-service
    liquibase:
        enabled: true
        change-log: classpath:db/changelog/db.changelog-master.yaml
        drop-first: true
    jpa:
        hibernate:
            ddl-auto: validate

    datasource:
        url: jdbc:postgresql://localhost:5432/users
        username: postgres
        password: password

    public-paths:
      - /auth/signin
      - /auth/signup
      - /auth/refresh


jwt:
    refresh:
        expiration: 604800000   # 7 дней

    access:
        expiration: 900000    # 15 минут 

    private-path: classpath:jwt/private.pem
    public-path: classpath:jwt/public.pem

kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: orderEvent:com.example.producer.event.OrderEvent
